<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>luuk180</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
    }

    .card {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 0.05em;
      color: #fff;
    }

    .separator {
      margin: 1.5rem auto;
      width: 3rem;
      height: 2px;
      background: #444;
    }

    p {
      color: #888;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>luuk180</h1>
    <div class="separator"></div>
    <p>coming soon</p>
  </div>
</body>
</html>
